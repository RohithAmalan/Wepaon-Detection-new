name: weapon_detection_app
description: Weapon Detection System Mobile App - Flutter version

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP requests
  http: ^1.2.1

  # MQTT client
  mqtt_client: ^10.3.0

  # Shared preferences (replaces AsyncStorage)
  shared_preferences: ^2.2.3

  # WebView (replaces react-native-webview)
  webview_flutter: ^4.7.0

  # Firebase push notifications (replaces react-native-push-notification)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.1+2

  # Gradient support
  # (built-in via Container decoration in Flutter)

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
